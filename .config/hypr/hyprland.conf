################
### MONITORS ###
################

# HDMI-A-2: Vertical Monitor (Left), 2560x1080, 100Hz, Rotated 270 deg (transform 3)
monitor = HDMI-A-2, 2560x1080@100, 0x0, 1, transform, 3
# DP-1: Primary Monitor (Center), 2560x1440, 144Hz, Main Workspace
monitor = DP-1, 2560x1440@143.91, 1080x700, 1

###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$fileManager = kitty -e yazi
$menu        = wofi --show drun --gtk-dark
$browser     = firefox
$editor      = nvim

#################
### AUTOSTART ###
#################

exec-once = nm-applet &                                  # Network Manager tray icon
exec-once = waybar &                                     # Status bar
exec-once = hyprpaper &                                  # Wallpaper engine
exec-once = dunst &                                      # Notification daemon
exec-once = swayosd-server &                             # OSD server for volume/brightness visualizer
exec-once = /usr/lib/polkit-kde-authentication-agent-1 & # Auth agent for elevated rights

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,     16
env = XCURSOR_THEME,    Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,  16

# Toolkit Backends
env = ELECTRON_OZONE_PLATFORM_HINT, wayland
env = MOZ_ENABLE_WAYLAND,           1
env = QT_QPA_PLATFORM,              wayland;xcb
env = SDL_VIDEODRIVER,              wayland
env = _JAVA_AWT_WM_NONREPARENTING,  1

# NVIDIA Specific Tweaks
env = LIBVA_DRIVER_NAME,            nvidia
env = __GLX_VENDOR_LIBRARY_NAME,    nvidia
env = NVD_BACKEND,                  direct
env = GBM_BACKEND,                  nvidia-drm
env = CURSOR_QUIRK_DRM_MODIFIERS,   1

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 4
    gaps_out = 8
    border_size = 2

    # Gradient border for active windows
    col.active_border   = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(45475aaa)

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

# Tabbing/Group Settings (Great for vertical monitors)
group {
    col.border_active = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.border_inactive = rgba(45475aaa)

    groupbar {
        font_size = 10
        gradients = true
        col.active = rgba(89b4faee)
        col.inactive = rgba(45475aaa)
    }
}

decoration {
    rounding       = 8
    rounding_power = 2
    active_opacity   = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled      = true
        range        = 6
        render_power = 3
        color        = rgba(0d0d0dee)
    }

    blur {
        enabled   = true
        size      = 5
        passes    = 2
        vibrancy  = 0.17
    }
}

animations {
    enabled = yes
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4,    easeOutQuint
    animation = windowsIn,     1, 3.5,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.5,  linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = workspaces,    1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    focus_on_activate       = true
}

#############
### INPUT ###
#############

input {
    kb_layout  = us,ru
    # alt_shift: change language; caps:escape: map CapsLock to Escape (Vim friendly)
    kb_options = grp:alt_shift_toggle,caps:escape

    follow_mouse = 1
    sensitivity  = 0
}

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}

##########################
### WORKSPACE BINDINGS ###
##########################

# Assigning workspaces to specific monitors for consistency
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1

workspace = 6, monitor:HDMI-A-2, default:true
workspace = 7, monitor:HDMI-A-2
workspace = 8, monitor:HDMI-A-2

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Applications
bind = $mainMod, Return, exec, $terminal      # Open Terminal
bind = $mainMod, Q,      killactive,          # Close active window
bind = $mainMod, E,      exec, $fileManager   # File Manager
bind = $mainMod, B,      exec, $browser       # Browser
bind = $mainMod, Space,  exec, pkill wofi || $menu # App Launcher (Spotlight style)
bind = $mainMod SHIFT, C, exec, $terminal -e $editor # Quick Config Edit
bind = $mainMod, Escape, exec, hyprctl dispatch exit # Exit Hyprland

# Window Management
bind = $mainMod, V, togglefloating,           # Floating mode
bind = $mainMod, F, fullscreen, 0             # Fullscreen
bind = $mainMod, P, pseudo,                   # Dwindle Pseudotile
bind = $mainMod, T, layoutmsg, togglesplit    # Change split direction

# Grouping (Tabs) - Useful for the vertical monitor
bind = $mainMod, G, togglegroup,              # Toggle window group mode
bind = $mainMod CTRL, H, moveintogroup, l     # Merge window into group (left)
bind = $mainMod CTRL, L, moveintogroup, r     # Merge window into group (right)
bind = $mainMod, bracketleft,  changegroupactive, b # Previous tab
bind = $mainMod, bracketright, changegroupactive, f # Next tab

# Navigation (Vim-style HJKL)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move Window (Shift + HJKL)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Monitor Focus (Quick jump between screens)
bind = $mainMod, comma,  focusmonitor, l
bind = $mainMod, period, focusmonitor, r

# RESIZE MODE (Submap)
# Press Super+R, then use HJKL to resize, Esc to finish.
bind = $mainMod, R, submap, resize
submap = resize
    binde = , L, resizeactive, 40 0
    binde = , H, resizeactive, -40 0
    binde = , K, resizeactive, 0 -40
    binde = , J, resizeactive, 0 40
    bind = , escape, submap, reset 
    bind = , return, submap, reset 
submap = reset

# Workspaces Navigation
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8

# Move Window to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8

# Extra Navigation
bind = $mainMod, Tab, workspace, previous     # Quick back-and-forth between workspaces
bind = $mainMod, mouse_down, workspace, e+1   # Scroll through workspaces
bind = $mainMod, mouse_up,   workspace, e-1

# Screenshots
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy # Select area to clipboard
bind = , Print, exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png # Fullscreen to file

# AUDIO & MEDIA (Using SwayOSD for visual feedback)
# bindel: e = repeat when held, l = works on lockscreen
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle

# Custom Volume Bindings (Super + Minus/Equal)
bindel = $mainMod, equal, exec, swayosd-client --output-volume raise
bindel = $mainMod, minus, exec, swayosd-client --output-volume lower
bindl  = $mainMod, BackSpace, exec, swayosd-client --output-volume mute-toggle

# Media Player Control
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = $mainMod, backslash, exec, playerctl play-pause # Quick pause with Super+\

# Mouse Bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Ignore maximize requests from apps
windowrule {
    name      = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix for XWayland drag-and-drop issues
windowrule {
    name           = fix-xwayland-drags
    match:class    = ^$
    match:title    = ^$
    match:xwayland = true
    match:float    = true
    no_focus       = true
}

# Auto-float specific system popups
windowrule {
    name       = float-popups
    match:class = (pavucontrol|blueman-manager|nm-connection-editor|org.gnome.Calculator)
    float  = yes
    size   = 700 450
    center = yes
}
