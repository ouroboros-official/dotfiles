################
### MONITORS ###
################

monitor = HDMI-A-2, 2560x1080@100, 0x0,    1, transform, 3
monitor = DP-1,     2560x1440@143.91, 1080x700, 1

###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$fileManager = kitty -e yazi
$menu        = wofi --show drun --gtk-dark
$browser     = firefox
$editor      = nvim

#################
### AUTOSTART ###
#################

exec-once = nm-applet &
exec-once = waybar &
exec-once = hyprpaper &
exec-once = dunst &
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,     16
env = XCURSOR_THEME,    Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,  16

env = ELECTRON_OZONE_PLATFORM_HINT, wayland
env = MOZ_ENABLE_WAYLAND,           1
env = QT_QPA_PLATFORM,              wayland
env = SDL_VIDEODRIVER,              wayland
env = _JAVA_AWT_WM_NONREPARENTING,  1

env = LIBVA_DRIVER_NAME,            nvidia
env = __GLX_VENDOR_LIBRARY_NAME,    nvidia
env = NVD_BACKEND,                  direct
env = GBM_BACKEND,                  nvidia-drm

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 4
    gaps_out = 8

    border_size = 2

    col.active_border   = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(45475aaa)

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 8
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled      = true
        range        = 6
        render_power = 3
        color        = rgba(0d0d0dee)
    }

    blur {
        enabled   = true
        size      = 5
        passes    = 2
        vibrancy  = 0.17
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4,    easeOutQuint
    animation = windowsIn,     1, 3.5,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.5,  linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    focus_on_activate       = true
}

#############
### INPUT ###
#############

input {
    kb_layout  = us,ru
    kb_options = grp:win_space_toggle,caps:escape

    follow_mouse = 1
    sensitivity  = 0
}

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}

##########################
### WORKSPACE BINDINGS ###
##########################

workspace = 1, monitor:DP-1,     default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1

workspace = 6, monitor:HDMI-A-2, default:true
workspace = 7, monitor:HDMI-A-2
workspace = 8, monitor:HDMI-A-2

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod,       Q, exec,          $terminal
bind = $mainMod,       C, killactive,
bind = $mainMod,       E, exec,          $fileManager
bind = $mainMod,       B, exec,          $browser
bind = $mainMod SHIFT, C, exec,          $terminal -e $editor
bind = $mainMod,       R, exec, pkill wofi || wofi --show drun --gtk-dark
bind = $mainMod,       M, exec,          hyprctl dispatch exit

bind = $mainMod,       V, togglefloating,
bind = $mainMod,       F, fullscreen,        0
bind = $mainMod SHIFT, F, fullscreen,        1
bind = $mainMod,       P, pseudo,
bind = $mainMod,       T, layoutmsg,         togglesplit

bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod CTRL, H, resizeactive, -40 0
bind = $mainMod CTRL, L, resizeactive,  40 0
bind = $mainMod CTRL, K, resizeactive,  0 -40
bind = $mainMod CTRL, J, resizeactive,  0  40

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod ALT, 1, movetoworkspacesilent, 1
bind = $mainMod ALT, 2, movetoworkspacesilent, 2
bind = $mainMod ALT, 3, movetoworkspacesilent, 3
bind = $mainMod ALT, 6, movetoworkspacesilent, 6
bind = $mainMod ALT, 7, movetoworkspacesilent, 7
bind = $mainMod ALT, 8, movetoworkspacesilent, 8

bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace,        special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

bind = $mainMod, Tab,       workspace, m+1
bind = $mainMod SHIFT, Tab, workspace, m-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = ,      Print,      exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = SHIFT, Print,      exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod SHIFT, P, exec, grim -g "$(slurp)" - | wl-copy

bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bindel = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bindel = , XF86AudioMicMute,      exec, swayosd-client --input-volume mute-toggle
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name      = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name           = fix-xwayland-drags
    match:class    = ^$
    match:title    = ^$
    match:xwayland = true
    match:float    = true
    match:fullscreen = false
    match:pin      = false
    no_focus       = true
}

windowrule {
    name       = float-popups
    match:class = (pavucontrol|blueman-manager|nm-connection-editor|org.gnome.Calculator)
    float  = yes
    size   = 700 450
    center = yes
}

